<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conquest Social Wall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #111213;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .access-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        
        .lock-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        .title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .url-display {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #60a5fa;
            margin-bottom: 2rem;
        }
        
        .hidden {
            display: none;
        }
        
        .social-wall-container {
            width: 100%;
            height: 100vh;
            background-color: #111213;
        }
    </style>
</head>
<body>
    <div id="access-page" class="access-container">
        <div class="lock-icon">GitHub Pages</div>
        <h1 class="title">Conquest Social Wall</h1>
        <p class="subtitle">
            This social wall is hosted on GitHub Pages.
            Access the live social wall through the deployment URL.
        </p>
        <div class="url-display">
            https://prathamthakkar701.github.io/conquest_v2/
        </div>
        <p class="subtitle">
            <small>Deployed on GitHub Pages</small>
        </p>
    </div>
    
    <div id="social-wall" class="hidden">
        <div class="social-wall-container">
            <div id="root"></div>
            <script type="module" src="/src/main.jsx"></script>
        </div>
    </div>
    
    <script>
        // Check if this is the GitHub Pages URL
        if (window.location.hostname === 'prathamthakkar701.github.io') {
            document.getElementById('access-page').classList.add('hidden');
            document.getElementById('social-wall').classList.remove('hidden');
        }
    </script>
</body>
</html>
